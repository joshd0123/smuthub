<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your Companion — SmutHub Beta</title>
<meta name="description" content="Your private, spoiler-aware SmutHub reading companion.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0c0708">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/companion.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script defer src="/auth.js"></script>
<script defer src="/companion.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}body{background:#0c0708;color:#f4e8e3}
  a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  header.sitehead{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(12,7,8,.78);border-bottom:1px solid #2a1d22;font-family:'Hanken Grotesk',sans-serif}
  .nav{display:flex;align-items:center;justify-content:space-between;height:72px;gap:12px}.logo{display:inline-flex;align-items:center;font-weight:800;font-size:1.5rem}.logo .box{background:linear-gradient(100deg,#ff3d76,#ff7a4d 55%,#ffab40);color:#1a0c10;padding:.05em .42em;border-radius:.42em;margin-left:.12em}.navlinks{display:flex;gap:18px}.navlinks a{color:#a98a82;font-weight:500;font-size:.92rem}.navlinks a.on,.navlinks a:hover{color:#f4e8e3}.authbox{display:flex;align-items:center;gap:8px}
  .shc-status{position:fixed;left:50%;bottom:18px;z-index:95;transform:translateX(-50%);padding:.7em 1.1em;border:1px solid #ffab40;border-radius:99px;background:#150e10;color:#f4e8e3;font:700 .8rem 'Hanken Grotesk',sans-serif;opacity:0;pointer-events:none;transition:opacity .2s}.shc-status.show{opacity:1}
  @media(max-width:680px){.navlinks{display:none}.nav{height:62px}.wrap{padding:0 14px}}
</style>
</head>
<body class="shc-page">
<header class="sitehead">
  <div class="wrap nav">
    <a href="/index.html" class="logo">smut<span class="box">Hub</span></a>
    <nav class="navlinks">
      <a href="/dashboard.html">Dashboard</a><a href="/smuthub-app.html">Search</a><a href="/smuthub-bookcase.html">My Bookshelf</a><a href="/companion.html" class="on">Companion</a><a href="/glossary/">Glossary</a>
    </nav>
    <div id="authbox" class="authbox"></div>
  </div>
</header>

<main id="companionRoot" class="shc-page-wrap">
  <div class="shc-gate"><div class="ico">✦</div><h1>Calling your companion…</h1><p>Checking your private beta invitation.</p></div>
</main>
<div id="shcStatus" class="shc-status" role="status"></div>

<template id="roomTemplate">
  <div class="shc-page-grid">
    <section class="shc-portrait">
      <img src="/companion-aren.png" alt="Your companion in a candlelit library">
      <div class="shc-portrait-copy"><div class="shc-kicker" id="portraitRole">Guardian · private beta</div><h1 id="portraitName">Aren</h1><blockquote id="portraitQuote">“Your shelf has opinions. Fortunately, so do I.”</blockquote></div>
    </section>
    <section class="shc-room-panel" aria-label="Companion conversation">
      <div class="shc-room-top"><div><h2 id="roomTitle">Aren is present</h2><p>Ask about your shelf, your mood, or the rest of your day.</p></div><span class="shc-shield">◇ Spoiler shield</span></div>
      <div class="shc-room-prompts"><button>Pick my next read</button><button>I want something angsty</button><button>What does my shelf say about me?</button><button>Explain your spoiler rules</button></div>
      <div class="shc-room-messages" id="roomMessages" aria-live="polite"></div>
      <form class="shc-room-form" id="roomForm"><textarea id="roomInput" maxlength="1000" rows="2" placeholder="Say something…" aria-label="Message your companion"></textarea><button aria-label="Send message">↑</button></form>
    </section>
  </div>
  <details class="shc-settings">
    <summary>Shape your companion</summary>
    <div class="shc-settings-grid">
      <div class="shc-field"><label for="setName">Name</label><input id="setName" maxlength="40"></div>
      <div class="shc-field"><label for="setArchetype">Energy</label><select id="setArchetype"><option value="guardian">Guardian</option><option value="rival">Rival</option><option value="confidant">Confidant</option></select></div>
      <div class="shc-field"><label for="setVoice">Voice</label><select id="setVoice"><option value="velvet">Velvet</option><option value="ember">Ember</option><option value="stillwater">Stillwater</option></select></div>
      <div class="shc-field"><label for="setInitiative">Presence</label><select id="setInitiative"><option value="quiet">Waits for me</option><option value="contextual">Appears when useful</option><option value="proactive">Greets me first</option></select></div>
      <div class="shc-field"><label for="setFlirt">Flirt level</label><select id="setFlirt"><option value="0">Off</option><option value="1">A little</option><option value="2">Playful</option><option value="3">Bold</option></select></div>
      <div class="shc-field"><label for="setSpoiler">Spoilers</label><select id="setSpoiler"><option value="strict">Strict shield</option><option value="ask">Ask first</option><option value="off">Off</option></select></div>
      <button class="shc-save" id="saveCompanion">Save</button>
    </div>
  </details>
</template>

<script>
  const root=document.getElementById('companionRoot');
  const statusEl=document.getElementById('shcStatus');
  const localPreview=['localhost','127.0.0.1','[::1]'].includes(location.hostname)&&new URLSearchParams(location.search).has('preview');
  const status=m=>{statusEl.textContent=m;statusEl.classList.add('show');setTimeout(()=>statusEl.classList.remove('show'),1800)};

  window.addEventListener('sh-companion-ready',async e=>{
    const {allowed,user,profile}=e.detail||{};
    if(localPreview){SHCompanion.allowed=true;SHCompanion.profile=profile||{companion_name:'Aren',archetype:'guardian',voice_style:'velvet',initiative:'contextual',flirt_level:1,spoiler_mode:'strict'};renderRoom(SHCompanion.profile);SHCompanion.addMessage('There you are. I can see the shape of your shelf already. What sort of trouble are we choosing tonight?','assistant',document.getElementById('roomMessages'));return;}
    if(!user){
      root.innerHTML='<div class="shc-gate"><div class="ico">✦</div><h1>Your companion is waiting</h1><p>Sign in first. Companion access is currently limited to invited beta readers.</p><button onclick="SH.openAuth()">Log in / Sign up</button></div>';
      return;
    }
    if(!allowed){
      root.innerHTML='<div class="shc-gate"><div class="ico">◇</div><h1>The door is invitation-only</h1><p>You’re signed in, but this account is not in the Companion beta yet. Your shelf and account are unchanged.</p><a href="/dashboard.html">Back to the Hub</a></div>';
      return;
    }
    renderRoom(profile);
    const {data:history}=await SH.sb.from('companion_messages').select('role,content').order('created_at',{ascending:false}).limit(16);
    const messages=document.getElementById('roomMessages');
    if(history&&history.length) history.reverse().forEach(m=>SHCompanion.addMessage(m.content,m.role,messages));
    else SHCompanion.addMessage('There you are. I can see the shape of your shelf already. What sort of trouble are we choosing tonight?','assistant',messages);
  });

  function renderRoom(profile){
    root.innerHTML='';root.append(document.getElementById('roomTemplate').content.cloneNode(true));
    fillProfile(profile||SHCompanion.profile);
    const form=document.getElementById('roomForm'),input=document.getElementById('roomInput'),messages=document.getElementById('roomMessages');
    form.onsubmit=e=>{e.preventDefault();const v=input.value.trim();if(!v)return;input.value='';SHCompanion.ask(v,messages)};
    input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();form.requestSubmit()}};
    document.querySelectorAll('.shc-room-prompts button').forEach(btn=>btn.onclick=()=>SHCompanion.ask(btn.textContent,messages));
    document.getElementById('saveCompanion').onclick=saveProfile;
  }
  function fillProfile(p){
    p=p||{};const name=p.companion_name||'Aren';
    document.getElementById('portraitName').textContent=name;document.getElementById('roomTitle').textContent=name+' is present';document.getElementById('portraitRole').textContent=(p.archetype||'guardian')+' · private beta';
    document.getElementById('setName').value=name;document.getElementById('setArchetype').value=p.archetype||'guardian';document.getElementById('setVoice').value=p.voice_style||'velvet';document.getElementById('setInitiative').value=p.initiative||'contextual';document.getElementById('setFlirt').value=String(p.flirt_level??1);document.getElementById('setSpoiler').value=p.spoiler_mode||'strict';
    const quote={guardian:'“Your shelf has opinions. Fortunately, so do I.”',rival:'“You call that a dangerous TBR? Let me improve it.”',confidant:'“Tell me the mood. I’ll find the book that understands it.”'};document.getElementById('portraitQuote').textContent=quote[p.archetype]||quote.guardian;
  }
  async function saveProfile(){
    const values={companion_name:document.getElementById('setName').value.trim()||'Aren',archetype:document.getElementById('setArchetype').value,voice_style:document.getElementById('setVoice').value,initiative:document.getElementById('setInitiative').value,flirt_level:+document.getElementById('setFlirt').value,spoiler_mode:document.getElementById('setSpoiler').value};
    try{await SHCompanion.saveProfile(values);fillProfile(SHCompanion.profile);status('Companion saved ✨')}catch(e){status("Couldn't save: "+e.message)}
  }
</script>
</body>
</html>
