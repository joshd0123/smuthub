<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmutHub — Sitemap</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#0c0708;--panel:#1c1316;--line:#2a1d22;--cream:#f4e8e3;--muted:#b69089;--amber:#ffab40;--grad:linear-gradient(100deg,#ff3d76 0%,#ff7a4d 55%,#ffab40 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--cream);font-family:'Hanken Grotesk',sans-serif;line-height:1.6;padding:60px 24px}
.wrap{max-width:560px;margin:0 auto}
.logo{display:inline-flex;align-items:center;font-weight:800;font-size:1.4rem;text-decoration:none;color:var(--cream)}
.logo .box{background:var(--grad);color:#1a0c10;padding:.05em .42em;border-radius:.42em;margin-left:.12em}
h1{font-family:'Fraunces';font-weight:600;font-size:2rem;margin:24px 0 6px}
p{color:var(--muted);margin-bottom:24px}
.grp{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 22px;margin-bottom:14px}
.grp h2{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.grp a{display:block;color:var(--cream);text-decoration:none;padding:.35em 0;font-weight:600}
.grp a:hover{color:var(--amber)}
.grp .d{color:var(--muted);font-weight:400;font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="logo">smut<span class="box">Hub</span></a>
  <h1>Sitemap</h1>
  <p>Every room in the house.</p>
  <div class="grp"><h2>Main</h2>
    <a href="index.html">Home <span class="d">— the front door</span></a>
    <a href="smuthub-app.html">Search <span class="d">— find real books, rate the spice</span></a>
    <a href="smuthub-bookcase.html">My Bookcase <span class="d">— your shelves, your themes</span></a>
    <a href="stores.html">Find a Store <span class="d">— indie bookshops near you</span></a>
  </div>
  <div class="grp"><h2>Coming soon</h2>
    <a href="#">Tropes &amp; Trending</a>
    <a href="#">Newsletter</a>
    <a href="#">Community</a>
  </div>
</div>
</body>
</html>
