<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#150e10"/>
      <stop offset="1" stop-color="#0c0708"/>
    </linearGradient>
    <radialGradient id="glow1" cx="120" cy="-30" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3d76" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ff3d76" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1140" cy="70" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffab40" stop-opacity=".42"/>
      <stop offset="1" stop-color="#ffab40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logobox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3d76"/>
      <stop offset=".55" stop-color="#ff7a4d"/>
      <stop offset="1" stop-color="#ffab40"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80,90)">
    <text x="0" y="0" font-family="Hanken Grotesk, Inter, system-ui, sans-serif" font-weight="800" font-size="58" fill="#f4e8e3" letter-spacing="-1">smut</text>
    <rect x="158" y="-50" width="158" height="78" rx="14" fill="url(#logobox)"/>
    <text x="237" y="9" text-anchor="middle" font-family="Hanken Grotesk, Inter, system-ui, sans-serif" font-weight="800" font-size="58" fill="#1a0c10" letter-spacing="-1">Hub</text>
  </g>

  <g font-family="Fraunces, Georgia, serif" fill="#f4e8e3">
    <text x="80" y="290" font-size="92" font-weight="500" letter-spacing="-2">The hub for</text>
    <text x="80" y="395" font-size="92" font-weight="400" font-style="italic" fill="url(#logobox)" letter-spacing="-2">spicy fantasy</text>
    <text x="80" y="500" font-size="92" font-weight="500" letter-spacing="-2">reads.</text>
  </g>

  <g font-family="Hanken Grotesk, Inter, system-ui, sans-serif" fill="#b69089" font-size="26" font-weight="500" letter-spacing=".06em">
    <text x="80" y="570">BROWSE BY TROPE  ·  SORT BY HEAT  🌶️🌶️🌶️🌶️🌶️</text>
  </g>
</svg>
